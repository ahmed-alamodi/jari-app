<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Primary brand emerald gradient -->
    <linearGradient id="jariGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Accent gold gradient representing guidance and light -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
  </defs>

  <!-- Crescent moon representing worship, Fajr/Isha times, and guidance (Perfected Center) -->
  <path
    d="M 70 20 A 20 20 0 1 0 70 60 A 17 17 0 1 1 70 20 Z"
    fill="url(#goldGrad)"
  />

  <!-- Three flowing waves representing Sadaqah Jariyah and ongoing remembrance (Perfected Center) -->
  <!-- Primary Wave -->
  <path
    d="M 20 52 C 30 46, 40 46, 50 52 C 60 58, 70 58, 80 52"
    stroke="url(#jariGrad)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Secondary Wave -->
  <path
    d="M 15 62 C 26.6 56, 38.3 56, 50 62 C 61.6 68, 73.3 68, 85 62"
    stroke="url(#jariGrad)"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
    opacity="0.8"
  />

  <!-- Tertiary Wave -->
  <path
    d="M 26 72 C 34 67, 42 67, 50 72 C 58 77, 66 77, 74 72"
    stroke="url(#jariGrad)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />

  <!-- Arabic Typography for "جاري" -->
  <text
    x="50"
    y="90"
    text-anchor="middle"
    fill="url(#jariGrad)"
    font-family="'Tajawal', 'Segoe UI', Tahoma, sans-serif"
    font-weight="800"
    font-size="13"
  >جاري</text>
</svg>